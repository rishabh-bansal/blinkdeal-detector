name: BLINKDEAL Detector

# NOTE: GitHub throttles scheduled workflows heavily — the observed cadence is
# ~1.5–2.5h gaps, ~8% of the requested rate, and events can be dropped entirely
# (https://docs.github.com/actions/reference/workflows-and-actions/events-that-trigger-workflows#schedule).
# So this is only a BACKUP. The primary, reliable detector is a residential
# reporter (a Raspberry Pi) running scan.js every 5 min via cron. Watch
# /api/status `reporterStale` to know if the Pi has gone quiet.

on:
  schedule:
    # ACTIVE (~07:30–23:30 IST). GitHub cron is UTC; IST = UTC+5:30.
    - cron: "*/15 2-17 * * *"
    # OFF-HOURS
    - cron: "41 18-23 * * *"
    - cron: "41 0-1 * * *"
  workflow_dispatch: {}

permissions:
  contents: read

jobs:
  detect:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    # Fan out across 2 parallel runners (different IPs) to raise the odds one
    # gets past Myntra's IP block. Kept modest (2, not 4) now that the Pi is
    # primary — avoids disproportionate hosted-runner usage. fail-fast: false so
    # a blocked shard never cancels the one that got through.
    strategy:
      fail-fast: false
      matrix:
        shard: [1, 2]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "24"
      - name: Run detector (shard ${{ matrix.shard }})
        env:
          REPORT_URL: https://blinkdeal.paype.co
          REPORT_KEY: ${{ secrets.REPORT_KEY }}
          REPORTER_ID: github
        run: node scan.js
