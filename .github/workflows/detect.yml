name: BLINKDEAL Detector

on:
  schedule:
    # Tiered by the 100-day BLINKDEAL pattern data (sessions ~6 AM–9 PM IST,
    # near-zero overnight). GitHub cron is UTC; IST = UTC+5:30.
    #
    # ACTIVE (~07:30–23:30 IST): check every 5 min
    - cron: "*/5 2-17 * * *"
    # OFF-HOURS (23:30–07:30 IST): check every 30 min
    - cron: "11,41 18-23 * * *"
    - cron: "11,41 0-1 * * *"
  workflow_dispatch:
    inputs:
      max_attempts:
        description: "Fetch attempts before giving up this run"
        required: false
        default: "8"

# Never let two runs overlap (cron delays can stack runs).
concurrency:
  group: blinkdeal-detector
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  detect:
    runs-on: ubuntu-latest
    timeout-minutes: 12
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "24"

      - name: Run detector
        env:
          REPORT_URL: https://blinkdeal.paype.co
          REPORT_KEY: ${{ secrets.REPORT_KEY }}
          MAX_ATTEMPTS: ${{ github.event.inputs.max_attempts || '8' }}
        run: node scan.js
