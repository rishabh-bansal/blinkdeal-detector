name: BLINKDEAL Detector

# NOTE: GitHub throttles scheduled workflows heavily — the observed cadence is
# ~1.5–2.5h gaps, ~8% of the requested rate, and events can be dropped entirely
# (https://docs.github.com/actions/reference/workflows-and-actions/events-that-trigger-workflows#schedule).
# So this is only a BACKUP. The primary, reliable detector is a residential
# reporter (a Raspberry Pi) running scan.js every 5 min via cron. Watch
# /api/status `reporterStale` to know if the Pi has gone quiet.

on:
  schedule:
    # ACTIVE (~07:30–23:30 IST). GitHub cron is UTC; IST = UTC+5:30.
    - cron: "*/15 2-17 * * *"
    # OFF-HOURS
    - cron: "41 18-23 * * *"
    - cron: "41 0-1 * * *"
  workflow_dispatch: {}

permissions:
  contents: read

jobs:
  detect:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    # Single runner. The Pi is primary; GitHub is only a backup, and the worker
    # gates its state while the Pi is fresh — so 2 parallel shards just added a
    # real duplicate-alert race (two shards succeeding in the rare window when
    # the Pi IS stale) for little benefit. One shard removes that race entirely
    # and halves hosted-runner usage.
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "24"
      - name: Run detector
        env:
          REPORT_URL: https://blinkdeal.paype.co
          REPORT_KEY: ${{ secrets.REPORT_KEY }}
          REPORTER_ID: github
        run: node scan.js
